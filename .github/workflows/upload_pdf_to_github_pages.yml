name: Compile and Commit .typ Files

on:
    push:
        branches:
            - main
            - feature/test-action

jobs:
    compile-and-commit:
        runs-on: ubuntu-latest

        steps:
            # Checkout the repository
            - name: Checkout source repository
              uses: actions/checkout@v4

            - run: ls

            - uses: typst-community/setup-typst@v4
              with:
                cache-dependency-path: src\basic.typ

            - run: typst compile documents/glossario/glossario.typ glossario.pdf

            - uses: actions/upload-artifact@v4
              with:
                name: glossario
                path: glossario.pdf

