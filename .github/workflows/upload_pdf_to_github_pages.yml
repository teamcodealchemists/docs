name: Compile and Commit .typ Files

on:
    push:
        branches:
            - main
            - feature/test-action

jobs:
    compile-and-commit:
        runs-on: ubuntu-latest

        steps:
            #Checkout the repository
            - name: Checkout source repository
              uses: actions/checkout@v4

            - run: ls

            - uses: typst-community/setup-typst@v4

            #Compile the .typ file(s) while preserving folder structure
            - name: Compile .typ files
              run: |
                  mkdir -p compiled
                  find documents -name "*.typ" | while read file; do
                      if [[ "$file" != *"Lettera di Presentazione.typ"* ]]; then
                          output_dir="compiled/$(dirname "$file")"
                          mkdir -p "$output_dir"
                          typst compile --root=/ "$file" "$output_dir/$(basename "${file%.typ}.pdf")"
                      fi
                  done

            #Checkout the target repository
            - name: Checkout target repository
              uses: actions/checkout@v3
              with:
                  repository: teamcodealchemists/teamcodealchemists.github.io
                  path: target-repo

            #Copy compiled files to the target repository while preserving folder structure
            - name: Copy compiled files
              run: |
                  rsync -a --prune-empty-dirs compiled/ target-repo/

            #Commit and push changes to the target repository
            - name: Commit and push changes
              working-directory: target-repo
              run: |
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"
                  git add .
                  git commit -m "Update compiled .typ files"
                  git push origin feature/SCRUM-55-Glossario-action
